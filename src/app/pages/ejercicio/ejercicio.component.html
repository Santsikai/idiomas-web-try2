<div class="page-wrapper">

  <!-- ── Header ── -->
  <div class="page-header">
    <div class="page-header__title">
      <span class="page-header__badge">{{ gv.nombre }}</span>
    </div>
    <div class="page-header__actions">
      <a class="btn-action btn-action--primary" (click)="showModal=true">+ Añadir palabra</a>
    </div>
  </div>

  <!-- ── Tabs Estudiar / Practicar ── -->
  <div class="mode-tabs">
    <button class="mode-tabs__tab" [class.mode-tabs__tab--active]="activeView==='estudiar'" (click)="setView('estudiar')">
      📖 Estudiar
    </button>
    <button class="mode-tabs__tab" [class.mode-tabs__tab--active]="activeView==='practicar'" (click)="setView('practicar')">
      ✏️ Practicar
    </button>
  </div>

  <!-- ── Vista: Estudiar ── -->
  <div class="view-panel" *ngIf="activeView==='estudiar'">

    <!-- Buscador -->
    <div class="word-search">
      <span class="word-search__icon">⌕</span>
      <input
        class="word-search__input"
        type="text"
        placeholder="Buscar palabra..."
        [value]="searchPalabra"
        (input)="onSearchPalabra($any($event.target).value)"
      >
    </div>

    <!-- Tabla -->
    <table class="word-table">
      <thead>
        <tr>
          <th (click)="sort('col1')">
            {{ gv.nombre_col1 }}
            <span class="sort-icon" *ngIf="sortedColumn==='col1'">{{ sortOrder==='asc' ? '↑' : '↓' }}</span>
            <span class="sort-icon sort-icon--dim" *ngIf="sortedColumn!=='col1'">⇅</span>
          </th>
          <th (click)="sort('col2')">
            {{ gv.nombre_col2 }}
            <span class="sort-icon" *ngIf="sortedColumn==='col2'">{{ sortOrder==='asc' ? '↑' : '↓' }}</span>
            <span class="sort-icon sort-icon--dim" *ngIf="sortedColumn!=='col2'">⇅</span>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of wordPageItems">
          <td>{{ item.col1 }}</td>
          <td>{{ item.col2 }}</td>
        </tr>
        <tr *ngIf="wordPageItems.length === 0">
          <td colspan="2" class="word-table__empty">Sin resultados</td>
        </tr>
      </tbody>
    </table>

    <!-- Paginación -->
    <div class="word-pagination" *ngIf="wordTotalPages > 1">
      <button class="word-pag__btn" [disabled]="wordPage===0" (click)="wordPage=wordPage-1">‹</button>
      <button
        class="word-pag__btn"
        *ngFor="let p of wordPageRange"
        [class.word-pag__btn--active]="wordPage===p"
        (click)="wordPage=p"
      >{{ p + 1 }}</button>
      <button class="word-pag__btn" [disabled]="wordPage===wordTotalPages-1" (click)="wordPage=wordPage+1">›</button>
    </div>

  </div>

  <!-- ── Vista: Practicar ── -->
  <div class="view-panel" *ngIf="activeView==='practicar'">
    <app-ejercicio-escribir></app-ejercicio-escribir>
  </div>

  <!-- ── Modal: añadir palabra ── -->
  <div class="popup" *ngIf="showModal">
    <div class="popup__content">
      <a (click)="showModal=false" class="close">✖</a>
      <h1>Crear nueva palabra</h1>
      <input type="text" [placeholder]="gv.nombre_col1 || 'Columna 1'" [(ngModel)]="col1New"/>
      <input type="text" [placeholder]="gv.nombre_col2 || 'Columna 2'" [(ngModel)]="col2New"/>
      <a (click)="create()" class="accept">Crear palabra</a>
    </div>
  </div>

</div>
