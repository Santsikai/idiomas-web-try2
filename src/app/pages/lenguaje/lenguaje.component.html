<div class="page-wrapper">

  <!-- Header -->
  <div class="page-header">
    <div class="page-header__title">
      <span class="page-header__badge" *ngIf="idioma.lenguaje">{{ idioma.lenguaje }}</span>
      <h1>{{ idioma.nombre }}</h1>
    </div>
    <div class="page-header__actions">
      <a class="btn-action" (click)="export()">Exportar</a>
      <a class="btn-action btn-action--primary" [routerLink]="['/pages/editar-lenguaje', idioma.id]" *ngIf="isUserPropietary">Configuración</a>
      <ng-container *ngIf="!isUserPropietary">
        <a class="btn-action btn-action--primary" (click)="compartir()" *ngIf="!hasUserAlreadyCompartido">+ Añadir a biblioteca</a>
        <a class="btn-action btn-action--danger" (click)="descompartir()" *ngIf="hasUserAlreadyCompartido">Quitar de biblioteca</a>
      </ng-container>
    </div>
  </div>

  <!-- Cards -->
  <div class="ag-format-container">
    <div class="ag-courses_box">
      <div class="ag-courses_item" *ngIf="isUserPropietary">
        <a (click)="showModal=true" class="ag-courses-item_link">
          <div class="ag-courses-item_bg"></div>
          <div class="ag-courses-item_title">+ Añadir Grupo</div>
        </a>
      </div>
      <div class="ag-courses_item" *ngFor="let gv of listgv">
        <a [routerLink]="['/pages/ejercicio', gv.id]" class="ag-courses-item_link">
          <div class="ag-courses-item_bg"></div>
          <div class="ag-courses-item_title">{{ gv.nombre }}</div>
        </a>
      </div>
    </div>
  </div>

  <!-- Modal: Crear GV -->
  <div class="popup" *ngIf="showModal">
    <div class="popup__content">
      <a (click)="showModal=false" class="close">✖</a>
      <h1>Nuevo Grupo de Vocabulario</h1>
      <input type="text" placeholder="Nombre del grupo" [(ngModel)]="nameNew"/>
      <input type="text" placeholder="Nombre columna 1" [(ngModel)]="col1New"/>
      <input type="text" placeholder="Nombre columna 2" [(ngModel)]="col2New"/>
      <a (click)="create()" class="accept">Crear grupo</a>
    </div>
  </div>

  <!-- Modal: Spinner -->
  <div class="popup" *ngIf="showspinner">
    <div class="popup__content popup__content--center">
      <h1>Exportando Lenguaje</h1>
      <h3>Espere unos segundos...</h3>
      <div class="square-circle-8"></div>
    </div>
  </div>

</div>
